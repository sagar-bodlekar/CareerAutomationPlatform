<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }} - Resume</title>
    <style>
        /* ─── Base Reset ───────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: {{ font_family | default('Helvetica, Arial, sans-serif') }};
            font-size: {{ font_size | default('11pt') }};
            line-height: 1.5;
            color: #333;
            {% if background_color %}
            background: {{ background_color }};
            {% endif %}
        }

        @page {
            size: A4;
            margin: {{ page_margin | default('2cm 2cm 2cm 2cm') }};
            @top-center {
                content: "";
            }
        }

        /* ─── Common Layout ────────────────────────────── */
        .resume-container {
            max-width: 210mm;
            margin: 0 auto;
        }

        .header {
            text-align: {{ header_align | default('center') }};
            margin-bottom: 1.5em;
            padding-bottom: 1em;
            border-bottom: 2px solid {{ accent_color | default('#2c3e50') }};
        }

        .header h1 {
            font-size: 24pt;
            color: {{ accent_color | default('#2c3e50') }};
            margin-bottom: 0.2em;
        }

        .header .title {
            font-size: 14pt;
            color: #666;
            margin-bottom: 0.5em;
        }

        .header .contact {
            font-size: 10pt;
            color: #666;
        }

        .header .contact span {
            margin: 0 0.5em;
        }

        .section {
            margin-bottom: 1.2em;
        }

        .section-title {
            font-size: 13pt;
            font-weight: bold;
            color: {{ accent_color | default('#2c3e50') }};
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.6em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #ddd;
        }

        .entry {
            margin-bottom: 0.8em;
            page-break-inside: avoid;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .entry-title {
            font-weight: bold;
            font-size: 12pt;
        }

        .entry-subtitle {
            font-weight: 600;
            color: {{ accent_color | default('#2c3e50') }};
        }

        .entry-date {
            font-size: 10pt;
            color: #888;
            white-space: nowrap;
        }

        .entry-org {
            font-size: 10pt;
            color: #666;
            margin-bottom: 0.3em;
        }

        .entry-description {
            font-size: 10.5pt;
            margin-top: 0.2em;
        }

        .entry-description ul {
            list-style: none;
            padding-left: 0;
        }

        .entry-description li {
            margin-bottom: 0.2em;
            padding-left: 1.2em;
            position: relative;
        }

        .entry-description li::before {
            content: "\\2022";
            position: absolute;
            left: 0.2em;
            color: {{ accent_color | default('#2c3e50') }};
        }

        .skill-category {
            margin-bottom: 0.5em;
        }

        .skill-category-name {
            font-weight: 600;
            font-size: 10.5pt;
            margin-bottom: 0.2em;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3em;
        }

        .skill-tag {
            font-size: 10pt;
            {% if skill_style == 'pill' %}
            padding: 0.1em 0.6em;
            border: 1px solid #ddd;
            border-radius: 3px;
            {% endif %}
        }

        .skill-tag.proficient {
            font-weight: 600;
        }

        .two-column {
            display: flex;
            gap: 2em;
        }

        .two-column .column {
            flex: 1;
        }

        {% block extra_styles %}{% endblock %}
    </style>
    {% if extra_css %}
    <style>{{ extra_css }}</style>
    {% endif %}
</head>
<body>
    <div class="resume-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>

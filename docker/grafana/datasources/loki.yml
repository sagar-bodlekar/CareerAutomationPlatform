# Grafana Loki Datasource
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: traceID
          type: regex
          matcherRegex: "trace_id=(\\w+)"
          url: '$${__value.raw}'
          urlDisplayLabel: "View Trace"

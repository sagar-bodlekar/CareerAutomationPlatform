# OpenTelemetry Collector Configuration — AI Career Platform
# Collects traces from all services and exports to console/file for now
# (Can be upgraded to Jaeger/Tempo in production)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  attributes:
    actions:
      - key: environment
        value: "development"
        action: upsert
      - key: cluster
        value: "career-platform"
        action: upsert

exporters:
  logging:
    loglevel: debug
    sampling_initial: 5
    sampling_thereafter: 100

  # Uncomment for Jaeger:
  # jaeger:
  #   endpoint: jaeger:14250
  #   tls:
  #     insecure: true

  # Uncomment for Grafana Tempo:
  # otlp:
  #   endpoint: tempo:4317
  #   tls:
  #     insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging]

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$uri",'
        '"status":$status,'
        '"duration":$request_time,'
        '"user_agent":"$http_user_agent"'
    '}';
    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 25M;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;

    server {
        listen 80;
        server_name localhost;

        # Docker DNS resolver - resolves upstream hostnames at request time,
        # not at startup. Required when using variables in proxy_pass.
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ─── Health Check ─────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ─── API Routes ───────────────────────────────────────
        location /api/v1/auth {
            limit_req zone=auth burst=5 nodelay;
            set $upstream "http://auth-api:8002";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/profiles {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://profile-api:8001";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/skills {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://profile-api:8001";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/experiences {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://profile-api:8001";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/education {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://profile-api:8001";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/projects {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://profile-api:8001";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/social-links {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://profile-api:8001";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/certifications {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://profile-api:8001";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/languages {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://profile-api:8001";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/resumes {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://resume-api:8003";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/jobs {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://job-api:8004";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/matches {
            limit_req zone=api burst=10 nodelay;
            set $upstream "http://match-api:8005";
            proxy_pass $upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

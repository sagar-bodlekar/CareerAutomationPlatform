version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── Database ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: career-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-career_platform}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: career-pgbouncer
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-postgres}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-career_platform}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 100
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  # ─── Cache & Queue Broker ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: career-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Object Storage ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: career-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # ─── Create MinIO buckets on startup ─────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: career-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb local/resumes --ignore-existing;
      mc mb local/cover-letters --ignore-existing;
      mc mb local/avatars --ignore-existing;
      mc mb local/scraping-artifacts --ignore-existing;
      mc policy set download local/resumes;
      echo 'MinIO buckets created successfully';
      "

  # ─── Resume Service ─────────────────────────────────────────
  resume-api:
    build:
      context: ./backend/resume_service
      dockerfile: Dockerfile
    container_name: career-resume-api
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - APP_NAME=${APP_NAME:-Career Platform}
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    logging: *default-logging

  # ─── Job Service ────────────────────────────────────────────
  job-api:
    build:
      context: ./backend/job_service
      dockerfile: Dockerfile
    container_name: career-job-api
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      - APP_NAME=${APP_NAME:-Career Platform}
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  # ─── Auth Service ───────────────────────────────────────────
  auth-api:
    build:
      context: ./backend/auth_service
      dockerfile: Dockerfile
    container_name: career-auth-api
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - APP_NAME=${APP_NAME:-Career Platform}
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  # ─── Profile Service ────────────────────────────────────────
  profile-api:
    build:
      context: ./backend/profile_service
      dockerfile: Dockerfile
    container_name: career-profile-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - APP_NAME=${APP_NAME:-Career Platform}
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  # ─── Reverse Proxy / API Gateway ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: career-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - postgres
      - redis
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
  minio-data:
